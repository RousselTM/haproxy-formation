services:
  nginx-admin:
    image: nginx:alpine
    restart: always
    ports:
      - "8404:8404"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nginx_net
      - haproxy_net

  nginx-visiteur:
    image: nginx:alpine
    restart: always
    ports:
      - "8008:80"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nginx_net
      - haproxy_net

  web1:
    image: httpd:alpine
    hostname: web1
    restart: always
    command: >
      sh -c "sed -i 's/#LoadModule include_module/LoadModule include_module/' /usr/local/apache2/conf/httpd.conf &&
             sed -i 's/Options Indexes FollowSymLinks/Options Indexes FollowSymLinks Includes/' /usr/local/apache2/conf/httpd.conf &&
             echo 'AddType text/html .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'AddOutputFilter INCLUDES .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'PassEnv HOSTNAME' >> /usr/local/apache2/conf/httpd.conf &&
             httpd-foreground"
    volumes:
      - ./web:/usr/local/apache2/htdocs
    networks:
      - haproxy_net

  web2:
    image: httpd:alpine
    hostname: web2
    restart: always
    command: >
      sh -c "sed -i 's/#LoadModule include_module/LoadModule include_module/' /usr/local/apache2/conf/httpd.conf &&
             sed -i 's/Options Indexes FollowSymLinks/Options Indexes FollowSymLinks Includes/' /usr/local/apache2/conf/httpd.conf &&
             echo 'AddType text/html .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'AddOutputFilter INCLUDES .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'PassEnv HOSTNAME' >> /usr/local/apache2/conf/httpd.conf &&
             httpd-foreground"
    volumes:
      - ./web:/usr/local/apache2/htdocs
    networks:
      - haproxy_net

  web3:
    image: httpd:alpine
    hostname: web3
    restart: always
    command: >
      sh -c "sed -i 's/#LoadModule include_module/LoadModule include_module/' /usr/local/apache2/conf/httpd.conf &&
             sed -i 's/Options Indexes FollowSymLinks/Options Indexes FollowSymLinks Includes/' /usr/local/apache2/conf/httpd.conf &&
             echo 'AddType text/html .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'AddOutputFilter INCLUDES .html' >> /usr/local/apache2/conf/httpd.conf &&
             echo 'PassEnv HOSTNAME' >> /usr/local/apache2/conf/httpd.conf &&
             httpd-foreground"
    volumes:
      - ./web:/usr/local/apache2/htdocs
    networks:
      - haproxy_net


networks:
  haproxy_net:
    driver: bridge
    external: true
  nginx_net:
    driver: bridge
    external: true

